<!DOCTYPE html>
<html>
<head>
<title>Verify Email</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<script src="analytics.js"></script>
</head>

<body style="font-family:Poppins;text-align:center;padding:50px;background:#f4f7fc;">

<h2>Access Your Course</h2>
<p>Enter the same email used during purchase.</p>

<input type="email" id="email" placeholder="Enter your email"
style="padding:12px;width:260px;border-radius:8px;border:1px solid #ccc;"><br><br>

<button id="verifyBtn" onclick="checkEmail()"
style="padding:12px 25px;background:#28a745;color:white;border:none;border-radius:25px;cursor:pointer;">
Check Now
</button>

<p id="msg" style="margin-top:15px;color:red;min-height:20px;"></p>

<script>
PSAAnalytics.trackEvent("verify_page_viewed", {});
(function prefillEmail(){
var latestLead = localStorage.getItem("latestLead");
if(!latestLead){
return;
}
try{
var parsed = JSON.parse(latestLead);
if(parsed.email){
document.getElementById("email").value = parsed.email;
}
}catch(err){
console.log("No valid local lead found");
}
})();

function setStatus(text, isError){
var msg = document.getElementById("msg");
msg.style.color = isError ? "#c0392b" : "#2e7d32";
msg.innerHTML = text;
}

function checkEmail(){

var email=document.getElementById("email").value.trim();
var verifyBtn=document.getElementById("verifyBtn");

if(email===""){
setStatus("Please enter email.", true);
PSAAnalytics.trackEvent("verify_validation_failed", {reason:"empty_email"});
return;
}

verifyBtn.disabled=true;
setStatus("Checking your purchase, please wait...", false);
PSAAnalytics.trackEvent("verify_started", {email: email});

fetch("https://script.google.com/macros/s/AKfycbwtalK3uLH3IUTpozV5tXy-MfEzDvT1rQhpTv9_2M3fP8uclyeBL0WIcIqEXSrBN-2h9Q/exec?email=" + encodeURIComponent(email))
.then(response=>response.text())
.then(data=>{

if(data.trim()==="FOUND"){
sessionStorage.setItem("paid","yes");
PSAAnalytics.trackEvent("verify_success", {email: email});
window.location.href="Excel_success_v3.html";
}else{
 
setStatus("Email not found. Please purchase course.", true);
setTimeout(()=>{window.location.href="index.html";},2000);
}

})
.catch(()=>{
verifyBtn.disabled=false;
PSAAnalytics.trackEvent("verify_error", {});
setStatus("Error checking email. Please try again.", true);
});

}

</script>

</body>
</html>
