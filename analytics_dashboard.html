<!DOCTYPE html>
<html>
<head>
<title>Analytics Dashboard - Professional Skills Academy</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<script src="analytics.js"></script>
<style>
body{font-family:'Poppins',sans-serif;background:#f5f8ff;color:#24324a;margin:0;padding:25px;}
.wrap{max-width:1100px;margin:auto;}
h1{font-size:28px;margin-bottom:8px;}
.sub{color:#5d6d8a;font-size:14px;margin-bottom:20px;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:20px;}
.card{background:#fff;border-radius:12px;padding:14px;box-shadow:0 8px 22px rgba(0,0,0,.08);}
.card h3{font-size:12px;color:#5d6d8a;margin:0 0 8px;text-transform:uppercase;}
.card p{font-size:24px;margin:0;font-weight:700;color:#1f3b78;}
.panel{background:#fff;border-radius:12px;padding:14px;box-shadow:0 8px 22px rgba(0,0,0,.08);margin-bottom:18px;}
.bar-row{display:flex;align-items:center;gap:10px;margin:8px 0;}
.bar-label{width:180px;font-size:13px;word-break:break-word;}
.bar-track{flex:1;background:#ecf1ff;border-radius:8px;overflow:hidden;height:22px;}
.bar-fill{background:linear-gradient(90deg,#3b82f6,#10b981);height:100%;}
.bar-count{width:42px;text-align:right;font-size:13px;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th,td{border-bottom:1px solid #eef2ff;padding:8px;text-align:left;}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px;}
button,a.btn{border:none;border-radius:8px;padding:9px 12px;background:#1f3b78;color:#fff;cursor:pointer;text-decoration:none;font-size:13px;}
button.secondary{background:#7f8fb1;}
</style>
</head>
<body>
<div class="wrap">
  <h1>📊 Website Analytics Dashboard</h1>
  <p class="sub">Local dashboard using tracked events from this browser. For production, connect the same events to GA4/Looker Studio.</p>

  <div class="actions">
    <a class="btn" href="index.html">← Back to Website</a>
    <button class="secondary" onclick="clearData()">Clear Local Analytics</button>
  </div>

  <div class="grid" id="summary"></div>

  <div class="panel">
    <h3>Event Counts</h3>
    <div id="bars"></div>
  </div>

  <div class="panel">
    <h3>Recent Events</h3>
    <table>
      <thead><tr><th>Time</th><th>Event</th><th>Page</th><th>Details</th></tr></thead>
      <tbody id="rows"></tbody>
    </table>
  </div>
</div>

<script>
PSAAnalytics.trackEvent("dashboard_viewed", {});

function render(){
  var events = PSAAnalytics.getStoredEvents();
  var counts = {};
  events.forEach(function(e){ counts[e.event] = (counts[e.event] || 0) + 1; });

  var buy = counts.buy_now_clicked || 0;
  var success = counts.payment_success || 0;
  var verifySuccess = counts.verify_success || 0;
  var failed = counts.payment_failed || 0;

  var conversion = buy ? ((success / buy) * 100).toFixed(1) + "%" : "0%";
  var verifyRate = success ? ((verifySuccess / success) * 100).toFixed(1) + "%" : "0%";

  var summary = [
    ["Total Events", events.length],
    ["Buy Clicks", buy],
    ["Payments Success", success],
    ["Payments Failed", failed],
    ["Checkout → Success", conversion],
    ["Success → Verify", verifyRate]
  ];

  document.getElementById("summary").innerHTML = summary.map(function(item){
    return '<div class="card"><h3>'+item[0]+'</h3><p>'+item[1]+'</p></div>';
  }).join('');

  var maxCount = Math.max.apply(null, Object.values(counts).concat([1]));
  var barsHtml = Object.keys(counts).sort(function(a,b){ return counts[b]-counts[a]; }).map(function(name){
    var width = Math.round((counts[name]/maxCount)*100);
    return '<div class="bar-row"><div class="bar-label">'+name+'</div><div class="bar-track"><div class="bar-fill" style="width:'+width+'%"></div></div><div class="bar-count">'+counts[name]+'</div></div>';
  }).join('');
  document.getElementById("bars").innerHTML = barsHtml || '<p>No events yet.</p>';

  var rows = events.slice().reverse().slice(0,20).map(function(e){
    return '<tr><td>'+new Date(e.ts).toLocaleString()+'</td><td>'+e.event+'</td><td>'+e.page+'</td><td>'+JSON.stringify(e.payload || {})+'</td></tr>';
  }).join('');
  document.getElementById("rows").innerHTML = rows || '<tr><td colspan="4">No events yet.</td></tr>';
}

function clearData(){
  localStorage.removeItem(PSAAnalytics.STORAGE_KEY);
  render();
}

render();
</script>
</body>
</html>
