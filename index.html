<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Excel Mastery | Premium Edition</title>

<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;600;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
background:#000;
color:#fff;
overflow-x:hidden;
}

/* 🌌 PARTICLE CANVAS */
#particles{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

/* HERO */
.hero{
text-align:center;
padding:100px 20px 60px;
}

.hero h1{
font-family:'Playfair Display',serif;
font-size:42px;
margin-bottom:15px;
background:linear-gradient(90deg,#ffffff,#d4af37);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.hero p{
opacity:0.8;
margin-bottom:25px;
}

/* 💎 GLASS CARD */
.glass{
max-width:1100px;
margin:40px auto;
padding:40px;
border-radius:25px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(25px);
-webkit-backdrop-filter:blur(25px);
border:1px solid rgba(255,255,255,0.15);
box-shadow:0 20px 60px rgba(0,0,0,0.8);
position:relative;
}

/* ⚡ NEON BORDER ANIMATION */
.glass::before{
content:"";
position:absolute;
inset:-2px;
border-radius:25px;
padding:2px;
background:linear-gradient(45deg,#ff00cc,#3333ff,#00ffcc,#ffcc00);
background-size:300% 300%;
animation:neonBorder 6s linear infinite;
-webkit-mask:
linear-gradient(#000 0 0) content-box,
linear-gradient(#000 0 0);
-webkit-mask-composite:xor;
mask-composite:exclude;
pointer-events:none;
}

@keyframes neonBorder{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
margin-top:30px;
}

.card{
padding:25px;
border-radius:18px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,0.1);
text-align:center;
transition:0.4s;
animation:float 6s ease-in-out infinite;
}

.card:hover{
transform:translateY(-10px) scale(1.05);
box-shadow:0 15px 40px rgba(255,0,200,0.4);
}

.card:nth-child(2){animation-delay:1s;}
.card:nth-child(3){animation-delay:2s;}
.card:nth-child(4){animation-delay:3s;}

@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-15px);}
100%{transform:translateY(0);}
}

/* PRICE SECTION */
.price-box{
text-align:center;
margin-top:50px;
}

.price-box h2{
font-family:'Playfair Display',serif;
margin-bottom:10px;
}

.price{
margin:15px 0;
font-size:20px;
}

.price del{opacity:0.5;}

.price strong{
font-size:36px;
color:#d4af37;
}

/* BUTTON */
.btn{
padding:15px 45px;
border-radius:40px;
border:none;
cursor:pointer;
font-weight:600;
font-size:16px;
background:linear-gradient(45deg,#ff00cc,#3333ff);
color:#fff;
box-shadow:0 0 25px rgba(255,0,200,0.7);
transition:0.3s;
}

.btn:hover{
transform:translateY(-5px);
box-shadow:0 0 40px rgba(0,255,255,0.9);
}

.btn:active{
transform:scale(0.95);
}

/* FOOTER */
footer{
text-align:center;
padding:40px;
opacity:0.6;
font-size:13px;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="hero">
<h1>Master Microsoft Excel</h1>
<p>Apple-Style Premium Learning Experience</p>
</div>

<div class="glass">

<div class="grid">
<div class="card">📊 Used in Every Industry</div>
<div class="card">💼 High Salary Skill</div>
<div class="card">📈 Career Growth Guaranteed</div>
<div class="card">🌍 Global Demand</div>
</div>

<div class="price-box">
<h2>Exclusive Limited Offer</h2>
<div class="price">
<del>₹999</del><br>
<strong>₹1 Only</strong>
</div>
<button class="btn">Enroll Now</button>
</div>

</div>

<footer>
© 2026 Professional Skills Academy • Premium Edition
</footer>

<script>
/* 🌌 PARTICLE BACKGROUND */
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particlesArray=[];

class Particle{
constructor(){
this.x=Math.random()*canvas.width;
this.y=Math.random()*canvas.height;
this.size=Math.random()*2;
this.speedX=(Math.random()-0.5)*0.5;
this.speedY=(Math.random()-0.5)*0.5;
}
update(){
this.x+=this.speedX;
this.y+=this.speedY;
if(this.x>canvas.width) this.x=0;
if(this.x<0) this.x=canvas.width;
if(this.y>canvas.height) this.y=0;
if(this.y<0) this.y=canvas.height;
}
draw(){
ctx.fillStyle="rgba(255,255,255,0.6)";
ctx.beginPath();
ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
ctx.fill();
}
}

function init(){
particlesArray=[];
for(let i=0;i<120;i++){
particlesArray.push(new Particle());
}
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);
particlesArray.forEach(p=>{
p.update();
p.draw();
});
requestAnimationFrame(animate);
}

init();
animate();

window.addEventListener("resize",()=>{
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
init();
});
</script>

</body>
</html>
